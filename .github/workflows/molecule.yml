---

name: Molecule
on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
    paths-ignore:
      - '**/*.md'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python 3.
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install test dependencies.
        run: pip3 install yamllint==1.38.0 ansible-lint==26.6.0 ansible==14.2.0

      - name: Lint code.
        run: |
          yamllint .
          ansible-lint

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        distro:
          - fedora42
          - fedora43
          - fedora44
          - ubuntu2204
          - ubuntu2404
          - debian12
          - debian13
          - almalinux8
          - almalinux9
          - almalinux10
          - rockylinux8
          - rockylinux9
          - rockylinux10
        include:
          # EL8 ships managed-node Python 3.6.8, below ansible-core 2.17's
          # floor — pin those legs to ansible-core 2.16.x. Every other leg
          # uses latest ansible (dnf5 support on Fedora 41+ needs it).
          - distro: almalinux8
            ansible_pin: "ansible<10"
          - distro: rockylinux8
            ansible_pin: "ansible<10"

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python 3.
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      # The scenario's driver is podman (molecule/default/molecule.yml);
      # ubuntu-latest runners ship the podman CLI.
      - name: Install test dependencies.
        run: pip3 install "${{ matrix.ansible_pin || 'ansible==14.2.0' }}" molecule==26.6.0 molecule-plugins[podman]==26.7.15 requests==2.34.2

      - name: Run Molecule tests.
        run: molecule test
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: galaxy
    needs:
      - lint
      - molecule
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout git repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Release on galaxy
        uses: ansible-actions/ansible-galaxy-action@388fe24563eb7889730a1c10587a8acd005bd42a # v1.2.0
        with:
          galaxy_api_key: ${{ secrets.GALAXY_API_KEY }}
