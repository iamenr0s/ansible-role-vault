---

- name: Converge
  hosts: all
  become: false
  gather_facts: true

  vars:
    vault_addr: "http://127.0.0.1:8200"
    vault_auth_method: approle
    vault_approle_role_id: "{{ __molecule_approle_role_id }}"
    vault_approle_secret_id: "{{ __molecule_approle_secret_id }}"
    vault_operations:
      read: true
      write: true
      ssh_host_sign: true
      ssh_client_sign: true
    vault_kv_read_path: molecule/app
    vault_kv_write_path: molecule/written
    vault_kv_write_data:
      rotated_by: molecule
    # Resolves to the role's own templates/example.env.j2
    vault_render_template: example.env.j2
    vault_render_dest: /etc/molecule-vault.env
    vault_ssh_host_role: molecule-host
    vault_ssh_client_role: molecule-client
    vault_ssh_client_pubkey_path: /root/.ssh/id_ed25519.pub
    vault_ssh_client_cert_path: /root/.ssh/id_ed25519-cert.pub

  pre_tasks:
    - name: Fetch the AppRole role_id from the dev Vault
      ansible.builtin.uri:
        url: http://127.0.0.1:8200/v1/auth/approle/role/molecule/role-id
        headers:
          X-Vault-Token: root
      register: __molecule_role_id_result

    - name: Generate an AppRole secret_id
      ansible.builtin.uri:
        url: http://127.0.0.1:8200/v1/auth/approle/role/molecule/secret-id
        method: POST
        headers:
          X-Vault-Token: root
        status_code:
          - 200
      register: __molecule_secret_id_result
      changed_when: true

    - name: Expose the AppRole credentials as facts
      ansible.builtin.set_fact:
        __molecule_approle_role_id: "{{ __molecule_role_id_result['json']['data']['role_id'] }}"
        __molecule_approle_secret_id: "{{ __molecule_secret_id_result['json']['data']['secret_id'] }}"
      no_log: true

  roles:
    - role: "{{ playbook_dir }}/../.."
