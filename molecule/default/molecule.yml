---

role_name_check: 1
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: instance
    # Tag pinned so an upstream image rebuild can't break the matrix silently;
    # bump deliberately.
    image: "iamenr0s/docker-${MOLECULE_DISTRO:-almalinux9}-ansible:1.1.10"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  inventory:
    host_vars:
      instance:
        # The test images ship a venv at /opt/venv that wins interpreter
        # discovery but lacks 'requests'; pin to the system Python where
        # prepare.yml installs python3-requests.
        ansible_python_interpreter: /usr/bin/python3
  playbooks:
    converge: ${MOLECULE_PLAYBOOK:-converge.yml}
    prepare: prepare.yml
scenario:
  # No idempotence step: SSH certificate signing intentionally issues a
  # fresh certificate (changed) on every run in v1.
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - destroy
