---

- name: Prepare
  hosts: all
  gather_facts: false
  become: false

  vars:
    vault_test_version: "2.0.3"
    vault_test_addr: "http://127.0.0.1:8200"
    vault_test_token: root

  tasks:
    - name: Install Python 3 (raw, cross-platform)
      ansible.builtin.raw: >
        bash -lc '
        if command -v dnf >/dev/null 2>&1; then
          dnf -y install python3;
        elif command -v yum >/dev/null 2>&1; then
          yum -y install python3;
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -y && apt-get install -y python3;
        fi'
      changed_when: true

    - name: Reset connection to use installed Python
      ansible.builtin.meta: reset_connection

    - name: Gather minimal facts
      ansible.builtin.setup:
        gather_subset: min

    - name: Install harness packages (Debian family)
      ansible.builtin.package:
        name:
          - unzip
          - openssh-client
          - python3-requests
          - ca-certificates
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install harness packages (RedHat family)
      ansible.builtin.package:
        name:
          - unzip
          - openssh
          - python3-requests
          - ca-certificates
        state: present
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Download and install the Vault binary
      ansible.builtin.unarchive:
        src: "https://releases.hashicorp.com/vault/{{ vault_test_version }}/vault_{{ vault_test_version }}_linux_amd64.zip"
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"
        creates: /usr/local/bin/vault

    # shell (not a module): starting a long-running background process with
    # nohup has no module equivalent; guarded by pgrep for re-runs.
    - name: Start Vault dev server
      ansible.builtin.shell: |
        if ! pgrep -x vault >/dev/null 2>&1; then
          nohup /usr/local/bin/vault server -dev \
            -dev-root-token-id={{ vault_test_token }} \
            -dev-listen-address=127.0.0.1:8200 \
            >/var/log/vault-dev.log 2>&1 &
        fi
      changed_when: true

    - name: Wait for the Vault dev server to answer
      ansible.builtin.uri:
        url: "{{ vault_test_addr }}/v1/sys/health"
        status_code:
          - 200
      register: __prepare_vault_health
      until: __prepare_vault_health['status'] == 200
      retries: 15
      delay: 2

    - name: Enable the AppRole auth method
      ansible.builtin.uri:
        url: "{{ vault_test_addr }}/v1/sys/auth/approle"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_test_token }}"
        body_format: json
        body:
          type: approle
        status_code:
          - 204
          - 400  # already enabled
      changed_when: true

    - name: Write the molecule test policy
      ansible.builtin.uri:
        url: "{{ vault_test_addr }}/v1/sys/policies/acl/molecule"
        method: PUT
        headers:
          X-Vault-Token: "{{ vault_test_token }}"
        body_format: json
        body:
          policy: |
            path "secret/*" {
              capabilities = ["create", "read", "update", "list", "delete"]
            }
            path "ssh/*" {
              capabilities = ["create", "read", "update", "list"]
            }
        status_code:
          - 200
          - 204
      changed_when: true

    - name: Create the molecule AppRole
      ansible.builtin.uri:
        url: "{{ vault_test_addr }}/v1/auth/approle/role/molecule"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_test_token }}"
        body_format: json
        body:
          token_policies: molecule
        status_code:
          - 200
          - 204
      changed_when: true

    - name: Enable the SSH secrets engine
      ansible.builtin.uri:
        url: "{{ vault_test_addr }}/v1/sys/mounts/ssh"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_test_token }}"
        body_format: json
        body:
          type: ssh
        status_code:
          - 204
          - 400  # already mounted
      changed_when: true

    - name: Generate the SSH CA signing key
      ansible.builtin.uri:
        url: "{{ vault_test_addr }}/v1/ssh/config/ca"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_test_token }}"
        body_format: json
        body:
          generate_signing_key: true
        status_code:
          - 200
          - 204
          - 400  # CA already configured
      changed_when: true

    - name: Create the SSH host signing role
      ansible.builtin.uri:
        url: "{{ vault_test_addr }}/v1/ssh/roles/molecule-host"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_test_token }}"
        body_format: json
        body:
          key_type: ca
          allow_host_certificates: true
          allowed_domains: "*"
          allow_subdomains: true
          allow_empty_principals: true
          ttl: 24h
          max_ttl: 24h
        status_code:
          - 200
          - 204
      changed_when: true

    - name: Create the SSH client signing role
      ansible.builtin.uri:
        url: "{{ vault_test_addr }}/v1/ssh/roles/molecule-client"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_test_token }}"
        body_format: json
        body:
          key_type: ca
          allow_user_certificates: true
          allowed_users: "*"
          default_user: root
          allow_empty_principals: true
          ttl: 8h
          max_ttl: 8h
        status_code:
          - 200
          - 204
      changed_when: true

    - name: Seed the KV secret the role will read
      ansible.builtin.uri:
        url: "{{ vault_test_addr }}/v1/secret/data/molecule/app"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_test_token }}"
        body_format: json
        body:
          data:
            username: molecule
            password: s3cr3t
            env: test
        status_code:
          - 200
      changed_when: true

    - name: Generate an SSH host key for signing
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -f /etc/ssh/ssh_host_ed25519_key -N ""
        creates: /etc/ssh/ssh_host_ed25519_key.pub

    - name: Ensure /root/.ssh exists
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        mode: "0700"

    - name: Generate an SSH client key for signing
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -f /root/.ssh/id_ed25519 -N ""
        creates: /root/.ssh/id_ed25519.pub
