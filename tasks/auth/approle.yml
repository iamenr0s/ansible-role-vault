---
- name: Obtain Vault token via AppRole login
  block:
    # auth_login has no TLS parameters (verified against hashicorp.vault
    # 2.0.0-dev): server trust comes from the system CA store or
    # REQUESTS_CA_BUNDLE on the executing host.
    - name: Login to Vault with role_id and secret_id
      hashicorp.vault.auth_login:
        url: "{{ vault_addr }}"
        auth_method: approle
        mount_path: "{{ vault_approle_mount }}"
        auth_params:
          role_id: "{{ vault_approle_role_id }}"
          secret_id: "{{ vault_approle_secret_id }}"
      register: __vault_auth_result
      no_log: true

    # Return shape verified against hashicorp.vault 2.0.0-dev: msg, token_id,
    # authentication (dict).
    - name: Normalize login result into vault_token
      ansible.builtin.set_fact:
        vault_token: "{{ __vault_auth_result['token_id'] }}"
      no_log: true
  rescue:
    - name: Fail with actionable AppRole error
      ansible.builtin.fail:
        msg: >-
          AppRole login to {{ vault_addr }} failed — check
          vault_approle_role_id / vault_approle_secret_id, and that the
          '{{ vault_approle_mount }}' auth mount exists and permits this
          role_id.
