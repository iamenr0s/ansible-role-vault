---
- name: Verify supplied token and normalize into vault_token
  tags: vault
  block:
    - name: Verify token via self-lookup
      ansible.builtin.uri:
        url: "{{ vault_addr }}/{{ __vault_api_prefix }}/auth/token/lookup-self"
        method: GET
        validate_certs: "{{ vault_validate_certs }}"
        ca_path: "{{ vault_ca_cert | default(omit) }}"
        headers:
          X-Vault-Token: "{{ vault_token_value }}"
        status_code:
          - 200
      register: __vault_token_lookup
      no_log: true
      changed_when: false

    - name: Normalize supplied token into vault_token
      ansible.builtin.set_fact:
        vault_token: "{{ vault_token_value }}"
      no_log: true
  rescue:
    - name: Fail with actionable token error
      ansible.builtin.fail:
        msg: >-
          Token verification against {{ vault_addr }} failed — the supplied
          vault_token_value is invalid, expired, or its policy denies
          auth/token/lookup-self.
