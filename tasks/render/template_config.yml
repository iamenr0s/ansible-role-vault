---
- name: Assert render destination is configured
  tags: vault
  ansible.builtin.assert:
    that:
      - vault_render_dest is defined
      - vault_render_dest | length > 0
    fail_msg: "vault_render_template also requires vault_render_dest to be set"
    quiet: true

- name: Render Vault secrets into the destination config file
  tags: vault
  ansible.builtin.template:
    src: "{{ vault_render_template }}"
    dest: "{{ vault_render_dest }}"
    owner: "{{ vault_render_owner }}"
    group: "{{ vault_render_group }}"
    mode: "{{ vault_render_mode }}"
    backup: "{{ vault_render_backup }}"
  no_log: true
