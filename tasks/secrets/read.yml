---
- name: Assert KV read path is configured
  tags: vault
  ansible.builtin.assert:
    that:
      - vault_kv_read_path is defined
      - vault_kv_read_path | length > 0
    fail_msg: "vault_operations.read requires vault_kv_read_path to be set"
    quiet: true

# Module names and parameters verified against hashicorp.vault 2.0.0-dev.
- name: Read secret from KV v2 engine
  tags: vault
  hashicorp.vault.kv2_secret_info:
    url: "{{ vault_addr }}"
    namespace: "{{ vault_namespace }}"
    token: "{{ vault_token }}"
    ca_cert: "{{ vault_ca_cert | default(omit) }}"
    tls_skip_verify: "{{ not (vault_validate_certs | bool) }}"
    engine_mount_point: "{{ vault_kv_mount }}"
    path: "{{ vault_kv_read_path }}"
  register: __vault_kv2_read_result
  no_log: true
  when: vault_kv_engine_version | int == 2

- name: Read secret from KV v1 engine
  tags: vault
  hashicorp.vault.kv1_secret_info:
    url: "{{ vault_addr }}"
    namespace: "{{ vault_namespace }}"
    token: "{{ vault_token }}"
    ca_cert: "{{ vault_ca_cert | default(omit) }}"
    tls_skip_verify: "{{ not (vault_validate_certs | bool) }}"
    engine_mount_point: "{{ vault_kv_mount }}"
    path: "{{ vault_kv_read_path }}"
  register: __vault_kv1_read_result
  no_log: true
  when: vault_kv_engine_version | int == 1

- name: Expose secret data as vault_secret_data
  tags: vault
  ansible.builtin.set_fact:
    # Verified against hashicorp.vault 2.0.0-dev source and a live Vault:
    # KV2 keeps the API's data/metadata envelope (values at secret.data.data),
    # KV1 returns the values directly at secret.data.
    vault_secret_data: >-
      {{ __vault_kv2_read_result['secret']['data']['data']
         if vault_kv_engine_version | int == 2
         else __vault_kv1_read_result['secret']['data'] }}
  no_log: true

- name: Render secrets into the configured template
  tags: vault
  ansible.builtin.include_tasks: "{{ role_path }}/tasks/render/template_config.yml"
  when:
    - vault_render_template is defined
    - vault_render_template | length > 0
