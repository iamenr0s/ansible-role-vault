---
- name: Assert KV write path and data are configured
  tags: vault
  ansible.builtin.assert:
    that:
      - vault_kv_write_path is defined
      - vault_kv_write_path | length > 0
      - vault_kv_write_data | length > 0
    fail_msg: >-
      vault_operations.write requires vault_kv_write_path and a non-empty
      vault_kv_write_data dict
    quiet: true

# Module names and parameters verified against hashicorp.vault 2.0.0-dev
# (state defaults to present; kv2 also supports cas for conditional writes).
- name: Write secret to KV v2 engine
  tags: vault
  hashicorp.vault.kv2_secret:
    url: "{{ vault_addr }}"
    namespace: "{{ vault_namespace }}"
    token: "{{ vault_token }}"
    ca_cert: "{{ vault_ca_cert | default(omit) }}"
    tls_skip_verify: "{{ not (vault_validate_certs | bool) }}"
    engine_mount_point: "{{ vault_kv_mount }}"
    path: "{{ vault_kv_write_path }}"
    data: "{{ vault_kv_write_data }}"
  no_log: true
  when: vault_kv_engine_version | int == 2

- name: Write secret to KV v1 engine
  tags: vault
  hashicorp.vault.kv1_secret:
    url: "{{ vault_addr }}"
    namespace: "{{ vault_namespace }}"
    token: "{{ vault_token }}"
    ca_cert: "{{ vault_ca_cert | default(omit) }}"
    tls_skip_verify: "{{ not (vault_validate_certs | bool) }}"
    engine_mount_point: "{{ vault_kv_mount }}"
    path: "{{ vault_kv_write_path }}"
    data: "{{ vault_kv_write_data }}"
  no_log: true
  when: vault_kv_engine_version | int == 1
